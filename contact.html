<!DOCTYPE HTML>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Luke Wood | Contact</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/stylesheet.css">
    <!-- Preconnecting to Google Fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Roboto font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <!-- Profile/home link -->
                <a href="index.html" class="logo">
                    <img src="assets/headshot.jpg" alt="Luke Wood Headshot">
                    <p>Profile</p>
                </a>
            </div>
            <div class="pages">
                <!-- Active nav item highlighted -->
                <a href="projects.html">Projects</a>
                <a href="experience.html">Experience</a>
                <a id="activenav" href="contact.html">Contact</a>
            </div>
        </nav>
    </header>

    <div class="wrapper">
        <h1>Contact</h1><br>

        <!-- Contact info section -->
        <div class="contact-container">
            <div class="contact-items">
                <i class="fa-solid fa-envelope"></i>
                <h2>Email</h2>
                <span>lkwood.dev@gmail.com</span>
            </div>
        </div>

        <!-- Contact form with Formspree integration for submissions -->
        <form autocomplete="off" method="post" action="https://formspree.io/f/xyzdqbzn">
            <h2>Enquire Here</h2>
            <label for="fname">First name: <span>*</span></label>
            <input type="text" id="fname" name="fname" placeholder="Enter your first name..." required><br>
            <label for="lname">Last name: <span>*</span></label>
            <input type="text" id="lname" name="lname" placeholder="Enter your last name..." required><br>
            <label for="email">Email address: <span>*</span></label>
            <input type="email" id="email" name="email" placeholder="Enter your contact email address..." required><br>
            <label for="company">Company:</label>
            <input type="text" id="company" name="company" placeholder="Enter your company name..."><br>
            <label for="message">Message: <span>*</span></label>
            <textarea id="message" name="message" placeholder="Write what you would like to contact me about..." required></textarea>
            <input type="submit" value="Submit">
        </form>
    </div>

    <!-- Scroll to top button -->
    <a href="#nav" class="to-top">
        <i class="fas fa-chevron-up"></i> 
        <p><b>To top</b></p>
    </a>

    <footer id="footer">
        <div class="footer-container">
            <div class="footer-item">
                <h2>CONTACT</h2>
                <ul>
                    <li><a href="mailto:lkwood.dev@gmail.com">lkwood.dev@gmail.com</a></li>
                    <li><a href="contact.html">Enquire Here</a></li>
                </ul>
            </div>
            <div class="footer-item">
                <h2>ABOUT</h2>
                <ul>
                    <li><a href="index.html">Profile</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="experience.html">Experience</a></li>
                    <li><a href="Luke_Wood_CV.pdf" target="_blank">CV</a></li>
                </ul>
            </div>
        </div>
        <p>© Self-derived website created by Luke Wood | 2024</p>
    </footer>

    <!-- JavaScript for interactive behavior -->
    <script src="javascript/scripts.js"></script>
</body>

</html>
